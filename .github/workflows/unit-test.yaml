name: unit-test
on:
  push:
  schedule:
    - cron: "0 17 * * *"
jobs:
  test:
    name: Unit Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
      - name: Setup Go
        uses: actions/setup-go@44694675825211faa026b3c33043df3e48a5fa00
        with:
          go-version-file: go.mod
      - name: Install Dependencies
        run: go get ./...
      - name: Test
        run: go test ./... -timeout 120s -coverprofile=./cover.out -covermode=atomic -coverpkg=./...
      - name: Check Test Coverage
        uses: vladopajic/go-test-coverage@cc5012c2cfa84542e02b079141958a885861d326
        with:
          config: ./.testcoverage.yml
          profile: cover.out
          local-prefix: "github.com/SolusiDataPintar/vaultmanager"
          threshold-file: 0
          threshold-package: 0
          threshold-total: 0
      - name: Run Gosec Security Scanner
        uses: securego/gosec@15d5c61e866bc2e2e8389376a31f1e5e09bde7d8
        with:
          args: "./..."
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@fd88b7d7ccbaefd23d8f36f73b59db7a3d246602
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
